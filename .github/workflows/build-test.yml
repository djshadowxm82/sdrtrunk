# Build test artifacts for the broadcastify OTA alias integration branch.
# Produces downloadable ZIP archives for Linux, macOS, and Windows.
name: Build Test Release

on:
  push:
    branches: [ copilot/integrate-broadcastify-calls-logic ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Build Linux and Mac releases with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: runtimeZipOthers -PprojectVersion=0.6.2-beta-1-broadcastify-ota

      - name: Build Windows release with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: runtimeZipWindows -PprojectVersion=0.6.2-beta-1-broadcastify-ota

      - name: Create Build Info file
        run: |
          echo -e "ref: $GITHUB_REF \ncommit: $GITHUB_SHA\nbuild: $(date +"%Y-%m-%dT%H:%M:%SZ")" > build/image/build_info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdrtrunk-test-builds
          path: |
            build/image/*.zip
            build/image/build_info.txt
          retention-days: 30
